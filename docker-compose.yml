services:

  # ─── Инфраструктура ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: wb_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-wb_user}
      POSTGRES_PASSWORD: ${DB_PASS:-wb_pass}
      POSTGRES_DB: ${DB_NAME:-wb_collector}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wb_user} -d ${DB_NAME:-wb_collector}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: wb_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Приложение ──────────────────────────────────────────────────────────────

  app:
    build: .
    container_name: wb_app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 2
    env_file: .env
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    labels:
      - "com.docker.compose.project=wb-collector"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build: .
    container_name: wb_celery
    command: celery -A src.tasks.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    labels:
      - "com.docker.compose.project=wb-collector"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "src.tasks.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  celery_beat:
    build: .
    container_name: wb_celery_beat
    command: celery -A src.tasks.celery_app beat --loglevel=info
    env_file: .env
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    labels:
      - "com.docker.compose.project=wb-collector"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped

  # ─── Nginx ───────────────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: wb_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  # ─── Мониторинг ──────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: wb_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: wb_loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: wb_promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: wb_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  loki_data:
  grafana_data:
